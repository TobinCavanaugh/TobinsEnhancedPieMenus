name: Package and Release Addon

on:
  push:
    tags:
      - 'v*' # Triggers workflow when a tag starting with 'v' is pushed (e.g., v1.0.0)

permissions:
  contents: write # Required to create/update releases and upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package Addon
        run: |
          # Use zip to compress the files
          # Excludes git configs, local helper scripts, test files, and media folder
          zip -r TobinsEnhancedPieMenus.zip . \
            -x "*.git*" \
            -x "*.gitignore" \
            -x "zip.ps1" \
            -x "TestProjects/*" \
            -x "media/*" \
            -x "TobinsEnhancedPieMenus.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: TobinsEnhancedPieMenus.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
